<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Símbolo floral — fundo totalmente transparente -->
  <g transform="translate(50, 50)">

    <!-- Anel externo -->
    <circle cx="0" cy="0" r="44"
      fill="none" stroke="#B89880" stroke-width="1.5" />

    <!-- 6 pétalas -->
    <ellipse cx="0" cy="-25" rx="8.5" ry="17" fill="#8C6B52" />
    <ellipse cx="0" cy="-25" rx="8.5" ry="17" fill="#8C6B52"
      transform="rotate(60)" />
    <ellipse cx="0" cy="-25" rx="8.5" ry="17" fill="#8C6B52"
      transform="rotate(120)" />
    <ellipse cx="0" cy="-25" rx="8.5" ry="17" fill="#8C6B52"
      transform="rotate(180)" />
    <ellipse cx="0" cy="-25" rx="8.5" ry="17" fill="#8C6B52"
      transform="rotate(240)" />
    <ellipse cx="0" cy="-25" rx="8.5" ry="17" fill="#8C6B52"
      transform="rotate(300)" />

    <!-- Miolo -->
    <circle cx="0" cy="0" r="10"
      fill="none" stroke="#8C6B52" stroke-width="1.2" />
    <circle cx="0" cy="0" r="5" fill="#5C4033" />

  </g>

</svg>
