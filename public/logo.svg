<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Só o símbolo — fundo totalmente transparente -->
  <g transform="translate(100, 100)">

    <!-- Anel externo -->
    <circle cx="0" cy="0" r="88"
      fill="none" stroke="#B89880" stroke-width="1.5" />

    <!-- Anel interno -->
    <circle cx="0" cy="0" r="74"
      fill="none" stroke="#D4C4B0" stroke-width="0.8" />

    <!-- 6 pétalas -->
    <ellipse cx="0" cy="-50" rx="12" ry="28" fill="#8C6B52" />
    <ellipse cx="0" cy="-50" rx="12" ry="28" fill="#8C6B52" transform="rotate(60)" />
    <ellipse cx="0" cy="-50" rx="12" ry="28" fill="#8C6B52" transform="rotate(120)" />
    <ellipse cx="0" cy="-50" rx="12" ry="28" fill="#8C6B52" transform="rotate(180)" />
    <ellipse cx="0" cy="-50" rx="12" ry="28" fill="#8C6B52" transform="rotate(240)" />
    <ellipse cx="0" cy="-50" rx="12" ry="28" fill="#8C6B52" transform="rotate(300)" />

    <!-- Miolo: anel e ponto -->
    <circle cx="0" cy="0" r="18"
      fill="none" stroke="#8C6B52" stroke-width="1.2" />
    <circle cx="0" cy="0" r="9" fill="#5C4033" />

    <!-- 6 pontos ornamentais no anel externo -->
    <circle cx="0" cy="-88" r="2.8" fill="#B89880" />
    <circle cx="0" cy="-88" r="2.8" fill="#B89880" transform="rotate(60)" />
    <circle cx="0" cy="-88" r="2.8" fill="#B89880" transform="rotate(120)" />
    <circle cx="0" cy="-88" r="2.8" fill="#B89880" transform="rotate(180)" />
    <circle cx="0" cy="-88" r="2.8" fill="#B89880" transform="rotate(240)" />
    <circle cx="0" cy="-88" r="2.8" fill="#B89880" transform="rotate(300)" />

  </g>

</svg>
