<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">

  <!-- Fundo creme -->
  <rect width="1200" height="630" fill="#FAF7F2" />

  <!-- Ornamentos de fundo sutis -->
  <circle cx="1060" cy="85"  r="320" fill="#EDE0D3" opacity="0.28" />
  <circle cx="150"  cy="545" r="210" fill="#EDE0D3" opacity="0.20" />

  <!-- Bordas duplas decorativas -->
  <rect x="30" y="30" width="1140" height="570" rx="4"
    fill="none" stroke="#D4C4B0" stroke-width="1.2" />
  <rect x="40" y="40" width="1120" height="550" rx="3"
    fill="none" stroke="#D4C4B0" stroke-width="0.5" />

  <!-- Símbolo floral grande — apenas a imagem, sem texto -->
  <g transform="translate(600, 315)">

    <!-- Anel externo -->
    <circle cx="0" cy="0" r="210"
      fill="none" stroke="#B89880" stroke-width="3" />

    <!-- Anel interno -->
    <circle cx="0" cy="0" r="178"
      fill="none" stroke="#D4C4B0" stroke-width="1.5" />

    <!-- 6 pétalas -->
    <ellipse cx="0" cy="-118" rx="29" ry="62" fill="#8C6B52" opacity="0.85" />
    <ellipse cx="0" cy="-118" rx="29" ry="62" fill="#8C6B52" opacity="0.85" transform="rotate(60)" />
    <ellipse cx="0" cy="-118" rx="29" ry="62" fill="#8C6B52" opacity="0.85" transform="rotate(120)" />
    <ellipse cx="0" cy="-118" rx="29" ry="62" fill="#8C6B52" opacity="0.85" transform="rotate(180)" />
    <ellipse cx="0" cy="-118" rx="29" ry="62" fill="#8C6B52" opacity="0.85" transform="rotate(240)" />
    <ellipse cx="0" cy="-118" rx="29" ry="62" fill="#8C6B52" opacity="0.85" transform="rotate(300)" />

    <!-- Miolo -->
    <circle cx="0" cy="0" r="42"
      fill="none" stroke="#8C6B52" stroke-width="2.5" />
    <circle cx="0" cy="0" r="20" fill="#5C4033" />

    <!-- 6 pontos ornamentais -->
    <circle cx="0" cy="-210" r="7" fill="#B89880" />
    <circle cx="0" cy="-210" r="7" fill="#B89880" transform="rotate(60)" />
    <circle cx="0" cy="-210" r="7" fill="#B89880" transform="rotate(120)" />
    <circle cx="0" cy="-210" r="7" fill="#B89880" transform="rotate(180)" />
    <circle cx="0" cy="-210" r="7" fill="#B89880" transform="rotate(240)" />
    <circle cx="0" cy="-210" r="7" fill="#B89880" transform="rotate(300)" />

  </g>

</svg>
